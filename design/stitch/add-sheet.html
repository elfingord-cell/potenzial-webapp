<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Entry Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<!-- Screen Wrapper simulating mobile view -->
<div class="relative flex h-screen w-full flex-col bg-gray-200 dark:bg-gray-900 overflow-hidden mx-auto max-w-md shadow-2xl">
<!-- Mock Background Content (Home Screen) -->
<div class="flex-1 flex flex-col p-6 space-y-6 opacity-40 blur-[2px] pointer-events-none select-none">
<div class="flex justify-between items-center">
<div class="h-10 w-10 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
<div class="h-6 w-24 bg-slate-300 dark:bg-slate-700 rounded"></div>
</div>
<div class="h-48 bg-slate-300 dark:bg-slate-700 rounded-2xl w-full"></div>
<div class="space-y-4">
<div class="h-20 bg-slate-300 dark:bg-slate-700 rounded-xl w-full"></div>
<div class="h-20 bg-slate-300 dark:bg-slate-700 rounded-xl w-full"></div>
<div class="h-20 bg-slate-300 dark:bg-slate-700 rounded-xl w-full"></div>
</div>
</div>
<!-- Bottom Sheet Overlay -->
<div class="absolute top-0 left-0 h-full w-full flex flex-col justify-end items-stretch bg-black/40 backdrop-blur-sm z-50">
<!-- Bottom Sheet Content -->
<div class="flex flex-col items-stretch bg-background-light dark:bg-background-dark rounded-t-3xl shadow-[0_-4px_24px_rgba(0,0,0,0.15)] ring-1 ring-white/10 dark:ring-white/5 transition-transform duration-300 ease-out transform translate-y-0">
<!-- Drag Handle -->
<div class="flex h-8 w-full items-center justify-center pt-3 pb-1">
<div class="h-1.5 w-12 rounded-full bg-slate-300 dark:bg-slate-600"></div>
</div>
<!-- Header -->
<div class="px-6 pb-4 pt-2 text-center relative">
<h3 class="text-slate-900 dark:text-white tracking-tight text-xl font-bold leading-tight">Add Savings</h3>
<button class="absolute right-6 top-2 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<!-- Type Selector (Segmented Control) -->
<div class="px-6 pb-6 pt-2">
<div class="flex h-12 w-full items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm transition-all duration-200 text-slate-500 dark:text-slate-400 has-[:checked]:text-slate-900 dark:has-[:checked]:text-white text-sm font-semibold leading-normal group">
<span class="truncate">Avoided</span>
<input checked="" class="invisible w-0 absolute" name="entry-type" type="radio" value="Avoided"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm transition-all duration-200 text-slate-500 dark:text-slate-400 has-[:checked]:text-slate-900 dark:has-[:checked]:text-white text-sm font-semibold leading-normal group">
<span class="truncate">Cheaper</span>
<input class="invisible w-0 absolute" name="entry-type" type="radio" value="Cheaper"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm transition-all duration-200 text-slate-500 dark:text-slate-400 has-[:checked]:text-slate-900 dark:has-[:checked]:text-white text-sm font-semibold leading-normal group">
<span class="truncate">Income</span>
<input class="invisible w-0 absolute" name="entry-type" type="radio" value="Income"/>
</label>
</div>
</div>
<!-- Amount Input -->
<div class="flex flex-col px-6 pb-6">
<label class="flex flex-col w-full group">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-2 pl-1">Amount saved</p>
<div class="relative flex items-center">
<span class="absolute left-4 text-slate-400 dark:text-slate-500 text-3xl font-semibold material-symbols-outlined">attach_money</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white bg-slate-100 dark:bg-slate-800/50 border-0 focus:ring-2 focus:ring-primary/50 focus:bg-white dark:focus:bg-slate-800 h-20 pl-12 pr-4 text-4xl font-bold tracking-tight placeholder:text-slate-300 dark:placeholder:text-slate-600 transition-all shadow-inner" inputmode="decimal" placeholder="0.00" type="number"/>
</div>
</label>
</div>
<!-- Note Input -->
<div class="flex flex-col px-6 pb-8">
<label class="flex flex-col w-full group">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-2 pl-1">Note (optional)</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white bg-slate-100 dark:bg-slate-800/50 border-0 focus:ring-2 focus:ring-primary/50 focus:bg-white dark:focus:bg-slate-800 h-14 pl-4 pr-10 text-base font-normal leading-normal placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all" placeholder="Coffee, impulse buy..." type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 material-symbols-outlined pointer-events-none text-xl">edit_note</span>
</div>
</label>
</div>
<!-- Action Button -->
<div class="px-6 pb-8">
<button class="w-full h-14 flex items-center justify-center rounded-xl bg-primary text-slate-900 font-bold text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all hover:bg-green-400">
                        Save Entry
                    </button>
</div>
<!-- Safe Area Spacer for iOS Home Indicator -->
<div class="h-6 w-full"></div>
</div>
</div>
</div>
</body></html>
